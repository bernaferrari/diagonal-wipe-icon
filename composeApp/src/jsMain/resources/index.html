<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Diagonal Wipe Icon Demo</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: #f4f5f7;
        }

        #root {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        body > canvas,
        #root > canvas {
            display: block;
            vertical-align: top;
        }

        #dev-notice {
            color: #7a1c1c;
            font-family: system-ui, sans-serif;
            font-size: 13px;
            position: absolute;
            inset: 12px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 8px 10px;
            display: none;
            white-space: pre-wrap;
            max-width: min(90vw, 900px);
        }
    </style>
</head>
<body>
<div id="root">
  <div id="dev-notice"></div>
</div>
  <script>
  window.onerror = function (message, source, line, column, error) {
    var notice = document.getElementById('dev-notice');
    if (!notice) {
      return;
    }
    notice.style.display = 'block';
    notice.style.whiteSpace = 'pre-wrap';
    notice.textContent = String(message) +
      (error && error.stack ? ('\n\n' + error.stack) : '') +
      (source ? ('\n' + source + ':' + line + ':' + column) : '');
  };

  window.addEventListener('error', function (event) {
    var notice = document.getElementById('dev-notice');
    if (!notice) {
      return;
    }
    notice.style.display = 'block';
    var error = event.error;
    var message = event.error ? event.error.message : event.message;
    notice.textContent = 'JS runtime error: ' + message;
    if (error && error.stack) {
      notice.textContent += '\n\n' + error.stack;
    }
  });

  window.addEventListener('unhandledrejection', function (event) {
    var notice = document.getElementById('dev-notice');
    if (!notice) {
      return;
    }
    notice.style.display = 'block';
    notice.textContent = 'Unhandled promise rejection: ' + String(event.reason);
    if (event.reason && event.reason.stack) {
      notice.textContent += '\n\n' + event.reason.stack;
    }
  });

  window.addEventListener('load', function () {
    var notice = document.getElementById('dev-notice');
    if (!notice) {
      return;
    }
    if (notice.style.display === 'block') {
      return;
    }
    notice.style.display = 'block';
    notice.style.color = '#0a4b38';
    notice.textContent = 'Kotlin/JS bundle loaded. canvas count=' + document.getElementsByTagName('canvas').length;
    setTimeout(function () {
      if (notice.textContent.indexOf('Kotlin/JS bundle loaded') === 0 && document.getElementsByTagName('canvas').length === 0) {
        notice.textContent = 'Bundle loaded but no canvas/root nodes were attached.';
      } else {
        notice.style.display = 'none';
      }
    }, 1000);
  });
  </script>
<script src="diagonal-wipe-icon.js"></script>
</body>
</html>
